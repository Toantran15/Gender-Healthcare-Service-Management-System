<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Danh sách câu hỏi</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      padding: 20px;
    }

    h2 {
      color: #2a7ae2;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #fff;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    th, td {
      border: 1px solid #ccc;
      padding: 12px;
      text-align: left;
    }

    th {
      background-color: #2a7ae2;
      color: white;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    tr:hover {
      background-color: #e0f0ff;
    }

    a {
      color: #2a7ae2;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .back-link {
      margin-top: 20px;
      display: inline-block;
    }
  </style>
</head>
<body>
<h2>Danh sách câu hỏi từ khách hàng</h2>
<table>
  <thead>
  <tr>
    <th>Khách hàng</th>
    <th>Câu hỏi</th>
    <th>Trả lời</th>
    <th>Hành động</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="q : ${questions}">
    <td th:text="${q.customer != null ? q.customer.fullName : 'Ẩn danh'}">Tên KH</td>
    <td th:text="${q.content}">Câu hỏi</td>
    <td th:text="${q.answer != null ? q.answer : 'Chưa trả lời'}">Trả lời</td>
    <td>
      <a th:href="@{'/consultant/questions/answer/' + ${q.id}}">Trả lời</a>
    </td>
  </tr>
  </tbody>
</table>
<br>
<a class="back-link" th:href="@{/consultant/home}">← Quay lại</a>
</body>
</html>
