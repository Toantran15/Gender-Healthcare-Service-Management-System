<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách lịch đã đặt</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            padding: 20px;
        }

        h2 {
            color: #2a7ae2;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #2a7ae2;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #e0f0ff;
        }
    </style>
</head>
<body>
<h2>Danh sách lịch đã đặt</h2>
<table>
    <tr>
        <th>Tên</th>
        <th>Thời gian</th>
        <th>Ghi chú</th>
    </tr>
    <tr th:each="a : ${appointments}">
        <td th:text="${a.customer != null ? a.customer.fullName : 'Không có tên'}"></td>
        <td th:text="${a.appointmentDateTime != null ? #temporals.format(a.appointmentDateTime, 'dd/MM/yyyy HH:mm') : 'Không có'}"></td>
        <td th:text="${a.reason != null ? a.reason : 'Không có ghi chú'}"></td>
    </tr>
</table>
</body>
</html>
