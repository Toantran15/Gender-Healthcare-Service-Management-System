<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm chu kỳ kinh nguyệt</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            padding: 30px;
        }

        h2 {
            color: #d81b60;
        }

        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            max-width: 400px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        label, input {
            display: block;
            margin-bottom: 10px;
            width: 100%;
            font-size: 16px;
        }

        input {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 16px;
            background-color: #1976d2;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #125aa0;
        }
    </style>
</head>
<body>

<h2>Nhập thông tin chu kỳ kinh nguyệt</h2>

<form method="post" th:action="@{/customer/cycle/track}">
    <label for="startDate">Ngày bắt đầu kỳ kinh:</label>
    <input type="date" id="startDate" name="startDate" required>

    <label for="cycleLength">Độ dài chu kỳ (ngày):</label>
    <input type="number" id="cycleLength" name="cycleLength" required value="28">

    <label for="periodLength">Số ngày hành kinh:</label>
    <input type="number" id="periodLength" name="periodLength" required value="5">

    <button type="submit">Lưu</button>
</form>

</body>
</html>
