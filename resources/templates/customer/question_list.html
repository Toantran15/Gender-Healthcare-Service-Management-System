<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách câu hỏi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            padding: 40px;
        }

        h2 {
            color: #2a7ae2;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: #2a7ae2;
            color: #fff;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        span {
            display: block;
            padding: 5px 0;
        }
    </style>
</head>
<body>

<h2>Câu hỏi của bạn</h2>

<table>
    <thead>
    <tr>
        <th>Câu hỏi</th>
        <th>Thời gian</th>
        <th>Câu trả lời</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="q : ${questions}">
        <td th:text="${q.content}">Câu hỏi</td>
        <td th:text="${#temporals.format(q.createdAt, 'dd/MM/yyyy HH:mm')}">Thời gian</td>
        <td>
            <span th:if="${q.answer != null}" th:text="${q.answer}">Câu trả lời</span>
            <span th:if="${q.answer == null}">Chưa có trả lời</span>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
