<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kết quả xét nghiệm STI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            padding: 20px;
        }

        h2 {
            color: #2a7ae2;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #2a7ae2;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #e0f0ff;
        }
    </style>
</head>
<body>
<h2>Xét nghiệm của bạn</h2>
<table>
    <tr>
        <th>Tên xét nghiệm</th>
        <th>Thời gian đặt</th>
        <th>Kết quả</th>
        <th>Thời gian có kết quả</th>
        <th>Trạng thái</th>
    </tr>
    <tr th:each="test : ${tests}">
        <td th:text="${test.testName}">Tên xét nghiệm</td>
        <td th:text="${#temporals.format(test.bookingTime, 'dd/MM/yyyy HH:mm')}">Thời gian đặt</td>
        <td th:text="${test.result != null ? test.result : 'Chưa có'}">Kết quả</td>
        <td th:text="${test.resultTime != null ? #temporals.format(test.resultTime, 'dd/MM/yyyy HH:mm') : '---'}">Thời gian có kết quả</td>
        <td th:text="${test.status}">Trạng thái</td>
    </tr>
</table>
</body>
</html>
