<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ - Chăm sóc sức khỏe giới tính</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            background-color: #f7f9fb;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 80px auto;
            padding: 40px;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            color: #2c3e50;
        }

        .nav-links {
            margin-top: 30px;
        }

        .nav-links a {
            display: inline-block;
            margin: 12px;
            padding: 12px 24px;
            background-color: #3498db;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        .nav-links a:hover {
            background-color: #2980b9;
        }

        .footer {
            margin-top: 40px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Chào mừng đến với Hệ thống chăm sóc sức khỏe giới tính</h1>

    <div class="nav-links">
        <a th:href="@{/login}">Đăng nhập</a>
        <a th:href="@{/register}">Đăng ký</a>
    </div>

    <div class="footer">
        &copy; 2025 - Trung tâm Y tế Sức khỏe Giới tính
    </div>
</div>
</body>
</html>
